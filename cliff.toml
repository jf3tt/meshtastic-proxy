# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }}\
  {% if commit.scope %} *({{ commit.scope }})*{% endif %} \
  ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/jfett/meshtastic-proxy/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = true
# Remove body lines that are not conventional commit headers (e.g. bullet
# points, blank lines). split_commits splits on "\n---\n", and each fragment
# is parsed independently. Without this, bullet-point body lines would be
# split into separate "commits" and either duplicated or cause parse errors.
commit_preprocessors = [
  { pattern = "\n- .*", replace = "" },
  { pattern = "\n  .*", replace = "" },
  { pattern = "\n\\*.*", replace = "" },
]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^perf", group = "Performance" },
  { message = "^doc", skip = true },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
