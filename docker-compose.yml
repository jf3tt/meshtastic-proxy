services:
  meshtastic-proxy:
    image: ghcr.io/jf3tt/meshtastic-proxy:latest
    container_name: meshtastic-proxy
    restart: unless-stopped
    ports:
      - "4404:4404"   # Proxy TCP port for Meshtastic clients
      - "8090:8090"   # Web dashboard
      - "5353:5353/udp" # mDNS
    volumes:
      - ./config.toml:/app/config.toml:ro
    # Uncomment if the node is on the host network:
    # network_mode: host
