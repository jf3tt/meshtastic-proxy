# Meshtastic TCP Proxy configuration
#
# Environment variable overrides (take precedence over TOML values):
#   MESHTASTIC_NODE_ADDRESS  -> node.address
#   MESHTASTIC_PROXY_LISTEN  -> proxy.listen
#   MESHTASTIC_WEB_LISTEN    -> web.listen
#   MESHTASTIC_LOG_LEVEL     -> logging.level

[node]
# Address of the Meshtastic node (host:port)
address = "192.168.1.100:4403"

# Initial reconnect interval after connection loss
reconnect_interval = "1s"

# Maximum reconnect interval (exponential backoff cap)
max_reconnect_interval = "30s"

# TCP dial timeout for connecting to the node
dial_timeout = "10s"

# Read timeout for the node connection (triggers reconnect if no data received)
read_timeout = "5m"

# Channel buffer sizes for node communication
from_buffer = 256   # FromRadio frames (node -> proxy)
to_buffer = 64      # ToRadio frames (proxy -> node)

[proxy]
# Address to listen for client connections
listen = ":4404"

# Maximum number of simultaneous client connections
max_clients = 10

# Per-client send channel buffer size
client_send_buffer = 256

# Disconnect clients that send no data for this duration (0 = disabled)
client_idle_timeout = "30m"

# Delay after sending own NodeInfo during iOS config-only replay (nonce 69420).
# Workaround for iOS CoreData timing issue. Set to 0 to disable.
ios_nodeinfo_delay = "50ms"

[web]
# Address to listen for the web dashboard
listen = ":8080"

# Enable or disable the web dashboard
enabled = true

[mdns]
# Enable mDNS service advertisement (_meshtastic._tcp)
# When enabled, iOS/Android Meshtastic apps will auto-discover this proxy
# on the local network via Bonjour/mDNS, just like a real Meshtastic node.
enabled = true

# Instance name shown in mDNS service browsers
instance = "Meshtastic Proxy"

# Hostname for mDNS SRV/A records (e.g. "meshtastic-proxy").
# The ".local." suffix is added automatically if not already present.
# When empty, os.Hostname() is used. This hostname appears in the SRV
# target field; iOS requires it to be in the .local domain to resolve.
# hostname = "meshtastic-proxy"

# Short name for the node (max 4 characters, sent as TXT record)
# This is displayed in the Meshtastic app alongside the node ID
short_name = "PRXY"

# Node ID in hex format (sent as TXT record)
# Example: "!deadbeef" — leave empty if not needed
id = ""

# Network interfaces to advertise mDNS on.
# Useful with hostNetwork in Kubernetes to target only the home LAN interface
# and avoid advertising on CNI/overlay interfaces (cni0, flannel.1, etc.).
# When empty, the system default multicast interface is used (original behaviour).
# interfaces = ["eth0"]

[logging]
# Log level: debug, info, warn, error
level = "info"

# Log format: text, json
format = "text"

[metrics]
# Maximum number of messages to keep in the ring buffer
max_messages = 200

# Maximum number of traffic samples (1 per second) for charts
max_traffic_samples = 300
