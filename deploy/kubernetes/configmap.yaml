apiVersion: v1
kind: ConfigMap
metadata:
  name: meshtastic-proxy
  namespace: meshtastic
  labels:
    app.kubernetes.io/name: meshtastic-proxy
data:
  config.toml: |
    [node]
    address = "10.10.0.3:4403"
    reconnect_interval = "1s"
    max_reconnect_interval = "30s"

    [proxy]
    listen = "0.0.0.0:4404"
    max_clients = 10

    [web]
    listen = "0.0.0.0:8090"
    enabled = true

    [mdns]
    enabled = true
    instance = "Meshtastic Proxy"
    short_name = "PRXY"
    id = ""
    # Set to your host's LAN-facing interface so that mDNS is advertised
    # into the home network rather than into CNI/overlay networks.
    interfaces = ["enx00155dc6c81d"]

    [logging]
    level = "debug"
    format = "text"
